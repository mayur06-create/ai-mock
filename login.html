<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Interview Coach</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ff4400;
            --primary-hover: #cc3700;
            --bg-color: #050505;
            --surface-color: rgba(20, 20, 20, 0.7);
            --text-dark: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient glowing box-shadow */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            box-shadow: inset 0 0 120px 20px rgba(255, 68, 0, 0.35);
            z-index: 9999;
        }

        .login-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
        }
        
        .login-card h2 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 30px;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 4px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(255, 68, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #fff;
        }
        
        /* Central Floating Logo behind the card */
        .bg-logo {
            position: absolute;
            font-size: 20rem;
            font-family: 'Outfit', sans-serif;
            color: rgba(255,255,255,0.02);
            font-weight: 800;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Cinematic Video Background -->
    <video autoplay loop muted playsinline style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2;">
        <source src="background.mp4" type="video/mp4">
    </video>
    <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,5,5,0.75); z-index: -1; pointer-events: none;"></div>

    <span class="bg-logo">G</span>

    <div class="login-card">
        <h2>LOGIN</h2>
        <form action="MockCoach.html" method="GET">
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" placeholder="agent@network.io" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">ACCESS COACH</button>
        </form>
        <a href="MockCoach.html" class="back-link">&larr; Return to Dashboard</a>
    </div>

</body>
</html>
